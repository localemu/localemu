<title>LocalEmu Control Center</title>

<body>
<div id="app">
  <header id="topbar">
    <div id="topbar-left">
      <button id="hamburger-btn" aria-label="Toggle sidebar menu" type="button">&#9776;</button>
      <a class="logo-text" id="brand-home" href="#/" title="Back to overview">LocalEmu</a>
      <span class="separator">|</span>
      <span class="badge accent" id="topbar-version"><span class="badge-label">v</span>...</span>
    </div>
    <div id="topbar-right">
      <span class="badge" id="topbar-port"><span class="badge-label">port</span>...</span>
      <span class="badge" id="topbar-uptime"><span class="badge-label">up</span>...</span>
      <span class="badge" id="connection-badge" title="Live event stream status">
        <span class="conn-dot" id="conn-dot"></span>
        <span class="conn-label" id="conn-label">connecting</span>
      </span>
    </div>
  </header>

  <div id="content">
    <aside id="sidebar">
      <div id="sidebar-search-wrap">
        <input type="text" id="sidebar-search" placeholder="Filter services..." autocomplete="off">
      </div>
      <div id="sidebar-list"></div>
    </aside>
    <main id="main">
      <div id="main-content"></div>
    </main>
  </div>

  <footer id="activity">
    <div id="activity-header">
      <h3>Activity</h3>
      <span class="activity-spacer"></span>
      <select id="activity-filter" aria-label="Filter activity by service">
        <option value="">All services</option>
      </select>
      <button id="activity-pause-btn" type="button" title="Pause / resume activity stream">Pause</button>
      <button id="activity-clear-btn" type="button" title="Clear local activity buffer (server keeps history)">Clear</button>
    </div>
    <div id="activity-list"></div>
  </footer>
</div>

<div id="toast" role="status" aria-live="polite"></div>
<div id="action-modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="action-modal" id="action-modal"></div>
</div>
